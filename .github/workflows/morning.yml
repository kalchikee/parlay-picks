name: Morning Parlay Picks (7 AM ET)

on:
  schedule:
    - cron: '0 11 * * *'   # 11:00 UTC = 7:00 AM EDT (Mar–Nov)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  morning:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore tally cache
        uses: actions/cache/restore@v4
        with:
          path: data/
          key: parlay-data-${{ github.run_id }}
          restore-keys: parlay-data-

      - name: Run morning parlay picks
        env:
          KALSHI_API_KEY_ID:  ${{ secrets.KALSHI_API_KEY_ID }}
          KALSHI_PRIVATE_KEY: ${{ secrets.KALSHI_PRIVATE_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python parlay.py --morning

      - name: Save data cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: data/
          key: parlay-data-${{ github.run_id }}

      - name: Commit picks file
        run: |
          git config user.name  "parlay-bot"
          git config user.email "parlay-bot@github.com"
          git add data/
          git diff --staged --quiet || git commit -m "picks: $(date -u +%Y-%m-%d) morning parlay"
          git push
